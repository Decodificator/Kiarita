<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Mi Niña Bonita</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, Helvetica, sans-serif;
    }

    body{
        width:100%;
        height:100vh;
        overflow:hidden;
        display:flex;
        justify-content:center;
        align-items:center;
        background:url("kiara.jpeg") center/cover no-repeat;
        position:relative;
    }

    body::before{
        content:"";
        position:absolute;
        inset:0;
        background:rgba(0,0,0,0.55);
        backdrop-filter:blur(2px);
    }
    #startScreen{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:100;
}

#startBtn{
    padding:20px 40px;
    border:none;
    border-radius:15px;
    font-size:1.3rem;
    cursor:pointer;
    background:white;
    transition:.3s;
}

#startBtn:hover{
    transform:scale(1.05);
}

    .container{
        position:relative;
        z-index:2;
        text-align:center;
        width:90%;
        max-width:900px;
    }

    .lyrics{
        color:white;
        font-size:3rem;
        font-weight:bold;
        text-shadow:0 0 15px rgba(0,0,0,0.8);
        min-height:120px;
        transition:all .5s ease;
        letter-spacing: 2px;
        line-height: 1.4;
    }

    

    @keyframes fade{
        from{
            opacity:0;
            transform:translateY(20px);
        }
        to{
            opacity:1;
            transform:translateY(0);
        }
    }

    .btn{
        margin-top:40px;
        padding:15px 35px;
        border:none;
        border-radius:12px;
        font-size:1.1rem;
        cursor:pointer;
        background:white;
        color:black;
        display:none;
        transition:.3s;
    }

    .btn:hover{
        transform:scale(1.05);
    }

    .letter{
        position:fixed;
        inset:0;
        background:rgba(0,0,0,0.85);
        display:none;
        justify-content:center;
        align-items:center;
        z-index:10;
        animation:fade .5s ease;
    }

    .letter img{
    width:90%;
    max-width:500px;
    border-radius:20px;
    box-shadow:0 0 30px rgba(255,255,255,0.3);
    }

    @media(max-width:768px){
        .lyrics{
            font-size:2rem;
        }
    }
</style>
</head>
<body>
<div id="startScreen">
    <button id="startBtn">💖 Comenzar 💖</button>
</div>
<div class="container">
    <div class="lyrics" id="lyrics"></div>

    <button class="btn" id="openBtn">
        Abrir Carta 💌
    </button>
    <button class="btn" id="muteBtn" style="display:inline-block; margin-left:10px;">
    🔊 Música
    </button>
</div>

<div class="letter" id="letter">
    <!-- CAMBIA "carta.jpg" POR TU IMAGEN -->
    <img src="carta.jpg" alt="Carta">
</div>

const song = document.getElementById("song");
const lyricsContainer = document.getElementById("lyrics");
const openBtn = document.getElementById("openBtn");
const letter = document.getElementById("letter");
const startBtn = document.getElementById("startBtn");
const startScreen = document.getElementById("startScreen");
const muteBtn = document.getElementById("muteBtn");

let current = -1;

let typingInterval;

function typeText(text){

    clearInterval(typingInterval);

    lyricsContainer.innerHTML = "";

    let i = 0;

    typingInterval = setInterval(() => {

        lyricsContainer.innerHTML += text.charAt(i);

        i++;

        if(i >= text.length){

            clearInterval(typingInterval);
        }

    }, 60);
}

song.addEventListener("timeupdate", () => {

    const currentTime = song.currentTime;

    if(
        current + 1 < lyrics.length &&
        currentTime >= lyrics[current + 1].time
    ){

        current++;

        typeText(lyrics[current].text);
    }
});

setTimeout(() => {
    openBtn.style.display = "inline-block";
}, 30000);

openBtn.addEventListener("click", () => {
    letter.style.display = "flex";
});

muteBtn.addEventListener("click", () => {

    song.muted = !song.muted;

    if(song.muted){
        muteBtn.innerText = "🔇 Silenciado";
    }else{
        muteBtn.innerText = "🔊 Música";
    }
});

startBtn.addEventListener("click", () => {

    song.play();

    startScreen.style.display = "none";
});
